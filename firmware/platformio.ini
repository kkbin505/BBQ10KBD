[env:esp32s3-bbq10]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
  T-vK/ESP32 BLE Keyboard @ ^0.3.2
  h2zero/NimBLE-Arduino @ ^1.4.2
monitor_speed = 115200
upload_port = COM23
monitor_port = COM23
monitor_dtr = 0
monitor_rts = 0
upload_speed = 460800

; 4MB flash layout
board_upload.flash_size = 4MB
board_build.partitions = default.csv

; Keep PSRAM support enabled for S3 modules with external RAM (e.g. 2MB)
build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSE_NIMBLE
